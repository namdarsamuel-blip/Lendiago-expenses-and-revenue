<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lendiago</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}

:root {
  --bg:        #08050F;
  --bg2:       #0D0A18;
  --layer1:    #110E1F;
  --layer2:    #181428;
  --layer3:    #201B33;
  --layer4:    #28223E;
  --accent:    #7C3AED;
  --accent2:   #A78BFA;
  --accent-glow: rgba(124,58,237,0.4);
  --green:     #10F0A0;
  --green-dim: rgba(16,240,160,0.08);
  --green-glow:rgba(16,240,160,0.25);
  --red:       #FF4D6A;
  --red-dim:   rgba(255,77,106,0.08);
  --red-glow:  rgba(255,77,106,0.25);
  --gold:      #FFD166;
  --gold-dim:  rgba(255,209,102,0.1);
  --white:     #FFFFFF;
  --t1:        #F0ECF8;
  --t2:        #8B80A8;
  --t3:        #4A4268;
  --border:    rgba(255,255,255,0.05);
  --border2:   rgba(255,255,255,0.1);
  --border3:   rgba(255,255,255,0.15);
}

html { height:100%; background:var(--bg); }
body {
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--t1);
  min-height:100%;
  max-width:430px;
  margin:0 auto;
  overflow-x:hidden;
  position:relative;
}

/* Ambient background glow */
body::before {
  content:'';
  position:fixed;
  top:-120px; left:50%;
  transform:translateX(-50%);
  width:600px; height:400px;
  background:radial-gradient(ellipse at center, rgba(124,58,237,0.12) 0%, transparent 70%);
  pointer-events:none;
  z-index:0;
}

::-webkit-scrollbar{width:0}

/* ════════════════════
   HEADER
════════════════════ */
.header {
  position:sticky; top:0; z-index:40;
  background:rgba(8,5,15,0.85);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  border-bottom:1px solid var(--border);
  padding:54px 24px 22px;
}

.h-row {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:26px;
}

.brand {
  display:flex; flex-direction:column; gap:2px;
}
.brand-name {
  font-size:20px; font-weight:800; letter-spacing:-0.5px;
  color:var(--white); line-height:1;
}
.brand-name em {
  font-style:normal;
  background:linear-gradient(135deg, var(--accent2), #C4B5FD);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
}
.brand-sub {
  font-size:10px; font-weight:500; letter-spacing:2px;
  text-transform:uppercase; color:var(--t3);
}

.sync-pill {
  display:flex; align-items:center; gap:7px;
  background:var(--layer2);
  border:1px solid var(--border2);
  border-radius:100px;
  padding:8px 16px;
  font-size:12px; font-weight:600; color:var(--t2);
  cursor:pointer; font-family:'Inter',sans-serif;
  transition:all .2s;
}
.sync-pill:active { background:var(--layer3); border-color:var(--accent2); color:var(--accent2); }
.dot { width:7px; height:7px; border-radius:50%; background:var(--green); flex-shrink:0; }
.dot.spin { background:var(--gold); animation:blink 1s ease infinite; }
.dot.err  { background:var(--red); }
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* DATE */
.date-block { text-align:center; margin-bottom:22px; }
.date-lg {
  font-size:24px; font-weight:800; letter-spacing:-0.8px; color:var(--white);
  line-height:1.1;
}
.date-sm {
  font-size:10px; font-weight:500; letter-spacing:2.5px;
  text-transform:uppercase; color:var(--t3); margin-top:5px;
}

/* TOTALS CARD */
.totals-card {
  background:linear-gradient(145deg, #1A1230 0%, #120D24 100%);
  border:1px solid rgba(124,58,237,0.2);
  border-radius:20px;
  padding:20px 22px;
  display:flex; align-items:stretch; gap:0;
  position:relative; overflow:hidden;
}
.totals-card::before {
  content:'';
  position:absolute; top:-60px; right:-60px;
  width:180px; height:180px;
  background:var(--accent);
  border-radius:50%;
  filter:blur(60px);
  opacity:0.12;
  pointer-events:none;
}
.totals-card::after {
  content:'';
  position:absolute; bottom:-40px; left:-20px;
  width:120px; height:120px;
  background:var(--green);
  border-radius:50%;
  filter:blur(50px);
  opacity:0.06;
  pointer-events:none;
}

.t-col { flex:1; text-align:center; position:relative; z-index:1; }
.t-col + .t-col {
  border-left:1px solid rgba(255,255,255,0.06);
}
.t-label {
  font-size:9px; font-weight:700; letter-spacing:2px;
  text-transform:uppercase; color:var(--t3); margin-bottom:8px;
  display:flex; align-items:center; justify-content:center; gap:4px;
}
.t-arrow { font-size:11px; }
.t-value {
  font-size:19px; font-weight:800; letter-spacing:-0.5px; line-height:1;
}
.t-value.in  { color:var(--green); }
.t-value.out { color:var(--red); }
.t-value.net { color:var(--gold); }

/* ════════════════════
   BODY
════════════════════ */
.body { padding:22px 20px 140px; position:relative; z-index:1; }

.list-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:16px;
}
.list-title {
  font-size:11px; font-weight:700; letter-spacing:2px;
  text-transform:uppercase; color:var(--t3);
}
.list-badge {
  background:var(--layer2); border:1px solid var(--border2);
  border-radius:100px; padding:4px 12px;
  font-size:11px; font-weight:600; color:var(--t3);
}

/* ════════════════════
   ENTRY CARD
════════════════════ */
.entry {
  background:var(--layer1);
  border:1px solid var(--border);
  border-radius:18px;
  margin-bottom:10px;
  overflow:hidden;
  animation:rise .3s cubic-bezier(.2,.8,.4,1) both;
  transition:transform .15s;
}
.entry:active { transform:scale(0.99); }
@keyframes rise {
  from { opacity:0; transform:translateY(14px); }
  to   { opacity:1; transform:translateY(0); }
}

/* Top glowing accent line */
.e-line {
  height:1px;
}
.entry.in  .e-line { background:linear-gradient(90deg, var(--green) 0%, transparent 60%); }
.entry.out .e-line { background:linear-gradient(90deg, var(--red)   0%, transparent 60%); }

.e-main { padding:16px 18px 14px; display:flex; align-items:center; gap:14px; }

/* Type badge — simple ↑↓ symbol box */
.e-type-box {
  width:42px; height:42px; border-radius:13px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:2px; flex-shrink:0;
}
.entry.in  .e-type-box { background:var(--green-dim); border:1px solid rgba(16,240,160,0.15); }
.entry.out .e-type-box { background:var(--red-dim);   border:1px solid rgba(255,77,106,0.15); }
.e-type-arrow { font-size:17px; line-height:1; }
.entry.in  .e-type-arrow { color:var(--green); }
.entry.out .e-type-arrow { color:var(--red);   }
.e-type-word {
  font-size:7px; font-weight:800; letter-spacing:1px; text-transform:uppercase;
}
.entry.in  .e-type-word { color:var(--green); }
.entry.out .e-type-word { color:var(--red);   }

.e-info { flex:1; min-width:0; }
.e-note-preview {
  font-size:14px; font-weight:600; color:var(--t1);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  margin-bottom:4px;
}
.e-date { font-size:11px; color:var(--t3); font-weight:400; }

.e-right { text-align:right; flex-shrink:0; }
.e-amount {
  font-size:18px; font-weight:800; letter-spacing:-0.5px; line-height:1;
}
.entry.in  .e-amount { color:var(--green); }
.entry.out .e-amount { color:var(--red);   }
.e-tag { font-size:10px; font-weight:500; color:var(--t3); margin-top:3px; }

/* Extra notes */
.e-extra-notes { padding:0 18px 12px 74px; display:flex; flex-direction:column; gap:5px; }
.e-note-item {
  font-size:12px; color:var(--t2); line-height:1.5;
  background:var(--layer2); border-radius:9px;
  padding:7px 11px;
  border-left:2px solid var(--border3);
}

/* Footer */
.e-foot {
  display:flex; justify-content:flex-end; align-items:center;
  padding:10px 18px;
  border-top:1px solid var(--border);
}
.del { 
  font-size:11px; font-weight:600; color:var(--t3);
  background:none; border:none; cursor:pointer;
  font-family:'Inter',sans-serif; padding:5px 10px;
  border-radius:8px; transition:all .15s; letter-spacing:0.3px;
}
.del:active { color:var(--red); background:var(--red-dim); }

/* ════════════════════
   EMPTY
════════════════════ */
.empty { text-align:center; padding:80px 28px; }
.empty-glyph { font-size:52px; margin-bottom:20px; display:block; }
.empty-h { font-size:20px; font-weight:800; color:var(--t1); margin-bottom:10px; letter-spacing:-0.5px; }
.empty-p { font-size:13px; color:var(--t3); line-height:1.8; }

/* ════════════════════
   TOAST
════════════════════ */
.toast {
  position:fixed; top:110px; left:50%; transform:translateX(-50%) translateY(-10px);
  background:var(--layer3); border:1px solid var(--border2);
  border-radius:100px; padding:11px 22px;
  font-size:13px; font-weight:600; color:var(--t1);
  opacity:0; transition:all .3s cubic-bezier(.2,.8,.4,1);
  z-index:300; white-space:nowrap; pointer-events:none;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ════════════════════
   FAB
════════════════════ */
.fab {
  position:fixed; bottom:36px; right:22px;
  width:58px; height:58px; border-radius:50%;
  background:linear-gradient(145deg, #8B5CF6, #6D28D9);
  border:none; cursor:pointer; z-index:39;
  display:flex; align-items:center; justify-content:center;
  font-size:26px; color:var(--white); font-weight:300;
  box-shadow: 0 0 0 1px rgba(139,92,246,0.4),
              0 8px 32px rgba(109,40,217,0.5),
              0 0 60px rgba(109,40,217,0.2);
  transition:transform .15s, box-shadow .15s;
}
.fab:active {
  transform:scale(0.91);
  box-shadow:0 4px 16px rgba(109,40,217,0.4);
}

/* ════════════════════
   OVERLAY + SHEET
════════════════════ */
.overlay {
  display:none; position:fixed; inset:0;
  background:rgba(4,2,10,0.8);
  backdrop-filter:blur(14px) saturate(160%);
  -webkit-backdrop-filter:blur(14px) saturate(160%);
  z-index:100; align-items:flex-end; justify-content:center;
}
.overlay.open { display:flex; }

.sheet {
  background:var(--bg2);
  border-radius:28px 28px 0 0;
  border-top:1px solid rgba(124,58,237,0.2);
  width:100%; max-width:430px;
  max-height:94vh; overflow-y:auto;
  animation:shUp .32s cubic-bezier(.32,.72,0,1);
  padding-bottom:44px;
}
@keyframes shUp { from{transform:translateY(100%)} to{transform:translateY(0)} }

.sh-drag {
  display:flex; justify-content:center;
  padding:14px 0;
  position:sticky; top:0; background:var(--bg2); z-index:2;
  border-radius:28px 28px 0 0;
}
.sh-handle { width:38px; height:4px; border-radius:100px; background:var(--layer4); }

.sh-head {
  padding:4px 24px 20px;
  border-bottom:1px solid var(--border);
  position:sticky; top:32px; background:var(--bg2); z-index:2;
}
.sh-title { font-size:24px; font-weight:800; color:var(--white); letter-spacing:-0.7px; }
.sh-sub   { font-size:12px; color:var(--t3); margin-top:5px; font-weight:400; }

.sh-body { padding:24px 24px 0; }
.sh-foot { padding:18px 24px 0; }

/* ════════════════════
   FORM FIELDS
════════════════════ */
.field { margin-bottom:22px; }
.f-label {
  font-size:10px; font-weight:700; letter-spacing:2px;
  text-transform:uppercase; color:var(--t3);
  margin-bottom:11px; display:block;
}

/* TYPE SELECTOR */
.type-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.t-card {
  padding:18px 16px; border-radius:16px;
  border:1.5px solid var(--border);
  background:var(--layer1);
  cursor:pointer; transition:all .18s;
  display:flex; flex-direction:column; align-items:flex-start; gap:10px;
}
.t-card:active { transform:scale(0.97); }
.t-card-icon {
  width:38px; height:38px; border-radius:11px;
  display:flex; align-items:center; justify-content:center;
  font-size:20px;
}
.in-icon  { background:var(--green-dim); border:1px solid rgba(16,240,160,0.15); color:var(--green); }
.out-icon { background:var(--red-dim);   border:1px solid rgba(255,77,106,0.15);  color:var(--red); }
.t-card-label { font-size:14px; font-weight:700; color:var(--t2); }
.t-card.sel-in  { border-color:var(--green); background:var(--green-dim); }
.t-card.sel-in  .t-card-label { color:var(--green); }
.t-card.sel-out { border-color:var(--red);   background:var(--red-dim); }
.t-card.sel-out .t-card-label { color:var(--red); }

/* DATE CHIPS */
.chips { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
.chip {
  padding:9px 18px; border-radius:100px;
  border:1.5px solid var(--border);
  background:var(--layer1);
  font-size:13px; font-weight:600; color:var(--t2);
  cursor:pointer; font-family:'Inter',sans-serif; transition:all .15s;
}
.chip.on { border-color:var(--accent2); background:rgba(124,58,237,0.15); color:var(--accent2); }
.chip:active { transform:scale(0.96); }

input[type="date"] {
  width:100%; background:var(--layer1);
  border:1.5px solid var(--border);
  border-radius:13px; padding:13px 16px;
  font-family:'Inter',sans-serif; font-size:15px;
  color:var(--t1); outline:none;
  -webkit-appearance:none; transition:border-color .15s;
  color-scheme:dark; margin-top:10px;
}
input[type="date"]:focus { border-color:var(--accent2); }

/* AMOUNT */
.amt-wrap { position:relative; }
.amt-sym {
  position:absolute; left:18px; top:50%; transform:translateY(-50%);
  font-size:22px; font-weight:700; color:var(--t3); pointer-events:none;
}
input[type="number"] {
  width:100%; background:var(--layer1);
  border:1.5px solid var(--border); border-radius:13px;
  padding:16px 18px 16px 44px;
  font-family:'Inter',sans-serif; font-size:30px; font-weight:800;
  color:var(--white); outline:none;
  -webkit-appearance:none; -moz-appearance:textfield;
  letter-spacing:-1px; transition:border-color .15s;
}
input[type="number"]:focus { border-color:var(--accent2); }
input[type="number"]::placeholder { color:var(--t3); }

/* NOTES */
.note-list { display:flex; flex-direction:column; gap:8px; margin-bottom:10px; }
.note-item {
  display:flex; align-items:flex-start; gap:10px;
  background:var(--layer1); border:1.5px solid var(--border);
  border-radius:13px; padding:12px 14px;
  transition:border-color .18s;
}
.note-item:focus-within { border-color:var(--border3); }
.note-n {
  width:22px; height:22px; border-radius:7px;
  background:var(--layer3);
  display:flex; align-items:center; justify-content:center;
  font-size:9px; font-weight:800; color:var(--t3);
  flex-shrink:0; margin-top:3px;
}
.note-item textarea {
  flex:1; background:none; border:none; outline:none;
  font-family:'Inter',sans-serif; font-size:14px; font-weight:400;
  color:var(--t1); resize:none; line-height:1.6; min-height:50px;
}
.note-item textarea::placeholder { color:var(--t3); }
.note-x {
  background:none; border:none; cursor:pointer;
  color:var(--t3); font-size:15px; padding:2px; line-height:1; transition:color .15s;
}
.note-x:active { color:var(--red); }

.add-note {
  display:inline-flex; align-items:center; gap:8px;
  font-size:13px; font-weight:600; color:var(--t3);
  background:none; border:none; cursor:pointer;
  font-family:'Inter',sans-serif; padding:4px 0; transition:color .15s;
}
.add-note:active { color:var(--accent2); }
.add-plus {
  width:22px; height:22px; border:1.5px dashed var(--border2);
  border-radius:7px; display:flex; align-items:center; justify-content:center;
  font-size:15px; font-weight:700;
}

/* SAVE BUTTON */
.save-btn {
  width:100%; padding:19px; border-radius:16px; border:none;
  background:linear-gradient(135deg, #7C3AED 0%, #9D5CF6 100%);
  color:var(--white); font-family:'Inter',sans-serif;
  font-size:16px; font-weight:800; cursor:pointer;
  letter-spacing:0.2px; margin-bottom:10px;
  box-shadow:0 4px 24px rgba(124,58,237,0.45);
  transition:transform .12s, filter .12s;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.save-btn:active { transform:scale(0.98); filter:brightness(0.88); }
.save-btn:disabled { opacity:0.45; cursor:not-allowed; transform:none; }

.spinner {
  display:none; width:17px; height:17px;
  border:2.5px solid rgba(255,255,255,0.25);
  border-top-color:var(--white); border-radius:50%;
  animation:spin .65s linear infinite;
}
@keyframes spin { to{transform:rotate(360deg)} }

.cancel-btn {
  width:100%; padding:16px; border-radius:16px;
  border:1.5px solid var(--border); background:none;
  color:var(--t3); font-family:'Inter',sans-serif;
  font-size:15px; font-weight:600; cursor:pointer;
  transition:border-color .15s, color .15s;
}
.cancel-btn:active { border-color:var(--border2); color:var(--t2); }
</style>
</head>
<body>

<!-- ── HEADER ── -->
<div class="header">
  <div class="h-row">
    <div class="brand">
      <div class="brand-name">Lendi<em>ago</em></div>
      <div class="brand-sub">Capital Solutions LLC</div>
    </div>
    <button class="sync-pill" onclick="syncSheet()" id="syncBtn">
      <div class="dot" id="syncDot"></div>
      <span id="syncTxt">Sync</span>
    </button>
  </div>

  <div class="date-block">
    <div class="date-lg" id="dateLg"></div>
    <div class="date-sm">Lendiago Capital Solutions LLC</div>
  </div>

  <div class="totals-card">
    <div class="t-col">
      <div class="t-label"><span class="t-arrow">↑</span> Income</div>
      <div class="t-value in" id="tIn">$0.00</div>
    </div>
    <div class="t-col">
      <div class="t-label"><span class="t-arrow">↓</span> Outcome</div>
      <div class="t-value out" id="tOut">$0.00</div>
    </div>
    <div class="t-col">
      <div class="t-label">Total</div>
      <div class="t-value net" id="tNet">$0.00</div>
    </div>
  </div>
</div>

<!-- ── BODY ── -->
<div class="body">
  <div class="list-header">
    <div class="list-title">Transactions</div>
    <div class="list-badge" id="cnt">—</div>
  </div>
  <div id="list"></div>
</div>

<!-- FAB -->
<button class="fab" onclick="openSheet()">+</button>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ── SHEET ── -->
<div class="overlay" id="overlay" onclick="bgClick(event)">
  <div class="sheet">
    <div class="sh-drag"><div class="sh-handle"></div></div>

    <div class="sh-head">
      <div class="sh-title">New Entry</div>
      <div class="sh-sub">Syncs live to your Google Sheet</div>
    </div>

    <div class="sh-body">

      <div class="field">
        <span class="f-label">What is this?</span>
        <div class="type-row">
          <div class="t-card" id="cardIn" onclick="pickType('in')">
            <div class="t-card-icon in-icon">↑</div>
            <div class="t-card-label">Money In</div>
          </div>
          <div class="t-card" id="cardOut" onclick="pickType('out')">
            <div class="t-card-icon out-icon">↓</div>
            <div class="t-card-label">Money Out</div>
          </div>
        </div>
      </div>

      <div class="field">
        <span class="f-label">Date</span>
        <div class="chips">
          <div class="chip on" id="c0" onclick="pickDate('today',0)">Today</div>
          <div class="chip"    id="c1" onclick="pickDate('yesterday',1)">Yesterday</div>
          <div class="chip"    id="c2" onclick="pickDate('pick',2)">Pick →</div>
        </div>
        <input type="date" id="dp" style="display:none" onchange="customDate(this.value)">
      </div>

      <div class="field">
        <span class="f-label">Amount</span>
        <div class="amt-wrap">
          <div class="amt-sym">$</div>
          <input type="number" id="amtInput" placeholder="0.00" step="0.01" min="0" inputmode="decimal">
        </div>
      </div>

      <div class="field">
        <span class="f-label">Note</span>
        <div class="note-list" id="noteList"></div>
        <button class="add-note" onclick="addNote()">
          <div class="add-plus">+</div>
          Add another note
        </button>
      </div>

    </div>

    <div class="sh-foot">
      <button class="save-btn" id="saveBtn" onclick="doSave()">
        <div class="spinner" id="spinner"></div>
        <span id="saveLbl">Save to Google Sheet</span>
      </button>
      <button class="cancel-btn" onclick="closeSheet()">Cancel</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──
const SCRIPT_URL = ''; // paste your Apps Script Web App URL here
const SHEET_ID   = '1xn-FaRahMQ73gtBQqKSweCvLyW9Y0zRWPUg9EMnhCe8';

// ── LOCAL DATA ──
let rows = JSON.parse(localStorage.getItem('lcs_v4') || 'null');
if (!rows) {
  rows = [{type:'Money in',date:'4/26/2026',note:'Capital contribution from member',amount:2500}];
  flush();
}
function flush(){ localStorage.setItem('lcs_v4',JSON.stringify(rows)); }

// ── UTILS ──
function uid()   { return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function today() { return new Date().toISOString().split('T')[0]; }
function yest()  { const d=new Date();d.setDate(d.getDate()-1);return d.toISOString().split('T')[0]; }
function $m(n)   { return '$'+Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtD(s) {
  try {
    const d=new Date(s.includes('-')?s:s.replace(/(\d+)\/(\d+)\/(\d+)/,'$3-$1-$2'));
    return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
  } catch { return s; }
}

// ── TOAST ──
let toastTimer;
function showToast(msg,ms=2600){
  clearTimeout(toastTimer);
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  toastTimer=setTimeout(()=>el.classList.remove('show'),ms);
}

// ── SYNC STATE ──
function setSyncState(s){
  const dot=document.getElementById('syncDot');
  const txt=document.getElementById('syncTxt');
  dot.className='dot'+(s==='spin'?' spin':s==='err'?' err':'');
  txt.textContent=s==='spin'?'Syncing…':s==='err'?'Error':'Sync';
}

// ── READ FROM SHEET ──
async function syncSheet(){
  if(!SCRIPT_URL){ showToast('⚠️ Paste your Script URL first'); return; }
  setSyncState('spin');
  try{
    const res=await fetch(SCRIPT_URL+'?action=read');
    const data=await res.json();
    if(data.rows){
      rows=data.rows.filter(r=>r[0]&&r[3]).map(r=>({type:r[0],date:r[1],note:r[2]||'',amount:parseFloat(r[3])||0}));
      flush(); render(); showToast('✓ Synced from Google Sheets');
      setSyncState('ok');
    }
  }catch(e){ setSyncState('err'); showToast('Sync failed — check Script URL'); }
}

// ── WRITE TO SHEET ──
async function writeRow(r){
  if(!SCRIPT_URL) return false;
  try{
    const res=await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'append',row:[r.type,r.date,r.note,r.amount]})});
    const d=await res.json(); return d.success;
  }catch{ return false; }
}

async function deleteRow(idx){
  if(!SCRIPT_URL) return false;
  try{
    const res=await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'delete',rowIndex:idx+2})});
    const d=await res.json(); return d.success;
  }catch{ return false; }
}

// ── RENDER ──
function render(){
  const now=new Date();
  document.getElementById('dateLg').textContent=now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});

  const inAmt  = rows.filter(r=>r.type==='Money in').reduce((s,r)=>s+r.amount,0);
  const outAmt = rows.filter(r=>r.type==='Money out').reduce((s,r)=>s+r.amount,0);
  const net    = inAmt-outAmt;

  document.getElementById('tIn').textContent  = $m(inAmt);
  document.getElementById('tOut').textContent = $m(outAmt);
  document.getElementById('tNet').textContent = $m(Math.abs(net));
  document.getElementById('tNet').style.color = net>=0?'var(--gold)':'var(--red)';
  document.getElementById('cnt').textContent  = rows.length+' entries';

  const list=document.getElementById('list');
  if(!rows.length){
    list.innerHTML=`<div class="empty"><span class="empty-glyph">💳</span><div class="empty-h">No transactions yet</div><div class="empty-p">Tap the + button to log your first entry.<br>It syncs directly to Google Sheets.</div></div>`;
    return;
  }

  list.innerHTML=[...rows].reverse().map((r,i)=>{
    const isIn=r.type==='Money in';
    const cls=isIn?'in':'out';
    const notes=r.note?(r.note.split('|||')):([]); 
    const preview=notes[0]||'—';
    const extras=notes.slice(1);
    const realIdx=rows.length-1-i;
    return `
    <div class="entry ${cls}" style="animation-delay:${i*0.045}s">
      <div class="e-line"></div>
      <div class="e-main">
        <div class="e-type-box">
          <div class="e-type-arrow">${isIn?'↑':'↓'}</div>
          <div class="e-type-word">${isIn?'IN':'OUT'}</div>
        </div>
        <div class="e-info">
          <div class="e-note-preview">${preview.length>44?preview.slice(0,44)+'…':preview}</div>
          <div class="e-date">${fmtD(r.date)}</div>
        </div>
        <div class="e-right">
          <div class="e-amount">${isIn?'+':'-'}${$m(r.amount)}</div>
          <div class="e-tag">${isIn?'Income':'Expense'}</div>
        </div>
      </div>
      ${extras.length?`<div class="e-extra-notes">${extras.map(n=>`<div class="e-note-item">${n}</div>`).join('')}</div>`:'' }
      <div class="e-foot">
        <button class="del" onclick="doDelete(${realIdx})">Delete</button>
      </div>
    </div>`;
  }).join('');
}

async function doDelete(idx){
  if(!confirm('Delete this transaction?')) return;
  rows.splice(idx,1); flush(); render();
  if(SCRIPT_URL){ const ok=await deleteRow(idx); showToast(ok?'Deleted from Google Sheet':'Deleted locally'); }
  else showToast('Deleted locally');
}

// ── SHEET STATE ──
let sType=null, sDate=today();

function openSheet(){
  sType=null; sDate=today();
  document.getElementById('cardIn').className='t-card';
  document.getElementById('cardOut').className='t-card';
  document.getElementById('amtInput').value='';
  document.getElementById('dp').style.display='none';
  [0,1,2].forEach(i=>document.getElementById('c'+i).classList.remove('on'));
  document.getElementById('c0').classList.add('on');
  document.getElementById('noteList').innerHTML=mkNoteRow(1);
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeSheet(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
}

function bgClick(e){ if(e.target===document.getElementById('overlay')) closeSheet(); }

function pickType(t){
  sType=t;
  document.getElementById('cardIn').className='t-card'+(t==='in'?' sel-in':'');
  document.getElementById('cardOut').className='t-card'+(t==='out'?' sel-out':'');
}

function pickDate(w,i){
  [0,1,2].forEach(j=>document.getElementById('c'+j).classList.remove('on'));
  document.getElementById('c'+i).classList.add('on');
  if(w==='today')     { sDate=today(); document.getElementById('dp').style.display='none'; }
  if(w==='yesterday') { sDate=yest();  document.getElementById('dp').style.display='none'; }
  if(w==='pick')      { document.getElementById('dp').style.display='block'; document.getElementById('dp').focus(); }
}

function customDate(v){ if(v) sDate=v; }

function mkNoteRow(n){
  return `<div class="note-item"><div class="note-n">${n}</div><textarea placeholder="Write a note..." rows="2"></textarea></div>`;
}

function addNote(){
  const list=document.getElementById('noteList');
  const n=list.querySelectorAll('.note-item').length+1;
  const d=document.createElement('div');
  d.className='note-item';
  d.innerHTML=`<div class="note-n">${n}</div><textarea placeholder="Another note..." rows="2"></textarea><button class="note-x" onclick="this.closest('.note-item').remove();renum()">✕</button>`;
  list.appendChild(d);
  d.querySelector('textarea').focus();
}

function renum(){
  document.querySelectorAll('#noteList .note-n').forEach((b,i)=>b.textContent=i+1);
}

async function doSave(){
  if(!sType){ showToast('Select Money In or Money Out'); return; }
  const a=parseFloat(document.getElementById('amtInput').value);
  if(!a||a<=0){ showToast('Enter a valid amount'); return; }
  const notes=Array.from(document.querySelectorAll('#noteList textarea')).map(t=>t.value.trim()).filter(Boolean);
  const noteStr=notes.join('|||');
  const [y,m,d]=sDate.split('-');
  const sheetDate=`${m}/${d}/${y}`;
  const typeStr=sType==='in'?'Money in':'Money out';
  const row={type:typeStr,date:sheetDate,note:noteStr,amount:a};

  rows.push(row); flush(); render();

  const btn=document.getElementById('saveBtn');
  const spn=document.getElementById('spinner');
  const lbl=document.getElementById('saveLbl');
  btn.disabled=true; spn.style.display='block'; lbl.textContent='Saving…';

  if(SCRIPT_URL){
    const ok=await writeRow(row);
    btn.disabled=false; spn.style.display='none'; lbl.textContent='Save to Google Sheet';
    showToast(ok?'✓ Saved to Google Sheet!':'Saved locally — sync failed');
    closeSheet();
  } else {
    btn.disabled=false; spn.style.display='none'; lbl.textContent='Save to Google Sheet';
    showToast('Saved locally — add Script URL to sync');
    closeSheet();
  }
}

render();
if(SCRIPT_URL) syncSheet();
</script>
</body>
</html>
